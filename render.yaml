services:
  - type: web
    name: art-studio-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 3 --timeout 120
    healthCheckPath: /healthz/
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "127.0.0.1,localhost"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_BASE_URL
        value: "https://feathure.d374ersqg5p6cr.amplifyapp.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://feathure.d374ersqg5p6cr.amplifyapp.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://feathure.d374ersqg5p6cr.amplifyapp.com"

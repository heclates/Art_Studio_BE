{% load i18n %}
<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px;">
    
    <p>Dobrý den,</p>
    
    <p>Děkujeme za registraci!</p>
    
    <p>Pro potvrzení vaší e-mailové adresy klikněte na tlačítko níže:</p>
    
    <p style="margin: 30px 0;">
        <a href="{{ verify_url }}" 
           style="background-color: #0066cc; color: white; padding: 12px 24px; 
                  text-decoration: none; border-radius: 4px; display: inline-block;">
            Potvrdit e-mail
        </a>
    </p>
    
    <p>Pokud tlačítko nefunguje, zkopírujte odkaz do prohlížeče:</p>
    <p style="word-break: break-all; color: #0066cc;">
        {{ verify_url }}
    </p>
    
    <p style="margin-top: 40px; font-size: 0.9em; color: #666;">
        S pozdravem,<br>
        Tým {{ site_name|default:"Našeho servisu" }}
    </p>
</body>
</html>
